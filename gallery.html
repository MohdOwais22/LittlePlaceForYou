<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Gallery — A Little Place For You</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: { cream: "#F8F3EA", beige: "#EDE2CE", ink: "#3A332A", blue: "#7C93A3" } } },
  };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-cream text-ink antialiased">

<div class="grain"></div>
<div id="particles"></div>
<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<header class="relative z-10 px-6 sm:px-12 pt-14 pb-10 text-center">
  <a href="index.html" class="magnetic inline-flex items-center gap-2 text-xs tracking-[0.25em] uppercase text-[var(--ink-soft)] hover:text-[var(--ink)] transition-colors mb-10">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M19 12H6M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back home
  </a>
  <p class="font-hand text-2xl text-[var(--blue)] mb-3">a few moments, kept safe</p>
  <h1 class="font-display text-4xl sm:text-5xl mb-4">The Gallery</h1>
  <p class="text-[var(--ink-soft)] max-w-md mx-auto leading-relaxed">Tap any photo to look closer.</p>
</header>

<main class="relative z-10 px-6 sm:px-12 pb-28 max-w-6xl mx-auto">
  <div id="polaroidGrid" class="grid grid-cols-2 md:grid-cols-3 gap-6 sm:gap-10"></div>
</main>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 z-50 hidden items-center justify-center bg-[var(--ink)]/90 backdrop-blur-md px-4 opacity-0">
  <button id="lightboxClose" aria-label="Close" class="magnetic absolute top-6 right-6 w-11 h-11 rounded-full flex items-center justify-center text-cream/80 hover:text-cream border border-cream/20 hover:border-cream/50 transition-colors">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <button id="lightboxPrev" aria-label="Previous" class="magnetic absolute left-3 sm:left-8 top-1/2 -translate-y-1/2 w-11 h-11 rounded-full flex items-center justify-center text-cream/80 hover:text-cream border border-cream/20 hover:border-cream/50 transition-colors">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button id="lightboxNext" aria-label="Next" class="magnetic absolute right-3 sm:right-8 top-1/2 -translate-y-1/2 w-11 h-11 rounded-full flex items-center justify-center text-cream/80 hover:text-cream border border-cream/20 hover:border-cream/50 transition-colors">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <figure id="lightboxFigure" class="max-w-xl w-full text-center">
    <img id="lightboxImg" src="" alt="" class="rounded-md shadow-2xl max-h-[70vh] mx-auto object-contain" />
    <figcaption id="lightboxCaption" class="font-hand text-2xl text-cream/90 mt-6"></figcaption>
  </figure>
</div>

<script src="js/gallery-data.js"></script>
<script src="js/gallery.js"></script>
</body>
</html>
