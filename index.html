<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Open When… — a little place, made just for you</title>
<meta name="description" content="A private collection of letters, written for the moments you need them most.">
<meta name="theme-color" content="#FAF8F5">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg-wash" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>
<div id="stars" class="stars" aria-hidden="true"></div>
<div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
<div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>
<div id="particles" aria-hidden="true" style="position:fixed;inset:0;pointer-events:none;z-index:10;overflow:hidden;"></div>
<div id="reading-progress" class="reading-progress" style="display:none"></div>

<!-- NAV -->
<header class="site-header">
  <span class="logo" data-magnetic>Open When…</span>
  <button id="themeToggle" aria-label="Toggle dark mode" data-magnetic class="icon-btn ripple-btn">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
</header>

<!-- HERO -->
<section class="hero" id="hero">
  <p class="eyebrow">a private collection, for you</p>
  <h1 class="hero-title">
    <span class="hero-char">O</span><span class="hero-char">p</span><span class="hero-char">e</span><span class="hero-char">n</span><span class="hero-char">&nbsp;</span><span class="hero-char">W</span><span class="hero-char">h</span><span class="hero-char">e</span><span class="hero-char">n</span><span class="hero-char">…</span>
  </h1>
  <p class="hero-sub"><span id="typewriter"></span><span class="typewriter-cursor">|</span></p>
  <div class="hero-cta-wrap">
    <a href="#envelopeGrid" data-magnetic class="hero-cta ripple-btn">choose a letter</a>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 9l-7 7-7-7"/></svg>
  </div>
</section>

<!-- ENVELOPE GRID -->
<main class="envelope-main">
  <div id="envelopeGrid" class="envelope-grid"></div>
</main>

<footer class="site-footer">written with care, kept just for you</footer>

<!-- LETTER OVERLAY -->
<div id="letterOverlay" role="dialog" aria-modal="true" aria-label="Letter">
  <button id="closeLetter" aria-label="Close letter" data-magnetic class="close-btn ripple-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
  <div id="letterScroll" class="letter-scroll">
    <article id="letterSheet" class="letter-sheet"></article>
  </div>
</div>

<!-- CINEMATIC FINALE -->
<div id="finale">
  <div class="finale-inner">
    <div class="finale-candle" id="finaleCandle" aria-hidden="true">
      <svg viewBox="0 0 34 52" width="34" height="52" fill="none" stroke="currentColor" stroke-width="1.4" style="color:var(--accent)">
        <rect x="9" y="20" width="16" height="30" rx="1.5"/>
        <path class="flame" d="M17 2c-2.6 3.6-3 6-1.2 8.2a3.4 3.4 0 105.6-3.4C19.8 5 19.4 4 17 2z" fill="currentColor" stroke="none" style="transform-origin:17px 10px"/>
      </svg>
    </div>
    <p id="finaleLine1" class="finale-line"></p>
    <p id="finaleLine2" class="finale-line"></p>
    <p id="finaleLine3" class="finale-sign"></p>
    <button id="finaleClose" data-magnetic class="finale-close ripple-btn">close this letter, gently</button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
